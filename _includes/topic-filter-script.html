<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('[data-topic-filter-root]').forEach(function(root) {
    var buttons = root.querySelectorAll('[data-topic-filter]');
    var items = root.querySelectorAll('[data-topics]');
    var sections = root.querySelectorAll('.year-section');
    var emptyState = root.querySelector('[data-topic-empty]');
    var validTopics = Array.prototype.map.call(buttons, function(button) {
      return button.dataset.topicFilter;
    });

    if (!emptyState) {
      emptyState = document.createElement('p');
      emptyState.className = 'text-muted mt-4';
      emptyState.hidden = true;
      emptyState.setAttribute('data-topic-empty', '');
      emptyState.innerHTML = '<span class="lang-en">No entries for this topic.</span><span class="lang-ko" style="display:none;">이 주제에 해당하는 항목이 없습니다.</span>';
      root.appendChild(emptyState);
    }

    function applyFilter(topic) {
      if (validTopics.indexOf(topic) === -1) {
        topic = 'all';
      }

      buttons.forEach(function(button) {
        var isActive = button.dataset.topicFilter === topic;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      items.forEach(function(item) {
        var topics = (item.dataset.topics || '').split(/\s+/);
        item.hidden = topic !== 'all' && topics.indexOf(topic) === -1;
      });

      sections.forEach(function(section) {
        var visible = Array.prototype.some.call(
          section.querySelectorAll('[data-topics]'),
          function(item) { return !item.hidden; }
        );
        section.hidden = !visible;
      });

      emptyState.hidden = Array.prototype.some.call(items, function(item) {
        return !item.hidden;
      });
    }

    function decodeHash(hash) {
      var rawHash = hash.replace(/^#/, '');
      try {
        return decodeURIComponent(rawHash);
      } catch (e) {
        return rawHash;
      }
    }

    function targetFromHash(hash) {
      var id = decodeHash(hash);
      if (!id) {
        return null;
      }

      return document.getElementById(id);
    }

    function targetVisibleForTopic(target, topic) {
      if (!target) {
        return true;
      }

      var item = target.matches('[data-topics]') ? target : target.closest('[data-topics]');
      if (!item) {
        return true;
      }

      var topics = (item.dataset.topics || '').split(/\s+/);
      return topic === 'all' || topics.indexOf(topic) !== -1;
    }

    root.applyTopicFilter = applyFilter;

    buttons.forEach(function(button) {
      button.addEventListener('click', function() {
        var topic = button.dataset.topicFilter;
        applyFilter(topic);

        var url = new URL(window.location.href);
        var hashTopic = decodeHash(url.hash);
        var hashTarget = targetFromHash(url.hash);
        if (validTopics.indexOf(hashTopic) !== -1 || !targetVisibleForTopic(hashTarget, topic)) {
          url.hash = '';
        }

        if (topic === 'all') {
          url.searchParams.delete('topic');
        } else {
          url.searchParams.set('topic', topic);
        }

        var nextUrl = url.pathname + url.search + url.hash;
        var currentUrl = window.location.pathname + window.location.search + window.location.hash;
        if (nextUrl === currentUrl) {
          return;
        }

        var historyMethod = button.dataset.topicFilterHistory === 'replace' ? 'replaceState' : 'pushState';
        history[historyMethod](null, '', nextUrl);
      });
    });

    function scrollToHashTarget(hash) {
      var target = targetFromHash(hash);
      if (!target) {
        return;
      }

      window.requestAnimationFrame(function() {
        target.scrollIntoView({ block: 'start' });
      });
    }

    function applyHashFilter() {
      var params = new URLSearchParams(window.location.search);
      var queryTopic = params.get('topic');
      if (validTopics.indexOf(queryTopic) !== -1) {
        applyFilter(queryTopic);
        if (window.location.hash) {
          if (targetVisibleForTopic(targetFromHash(window.location.hash), queryTopic)) {
            scrollToHashTarget(window.location.hash);
          } else {
            history.replaceState(null, '', window.location.pathname + window.location.search);
          }
        }
        return;
      }

      var topic = decodeHash(window.location.hash);
      if (validTopics.indexOf(topic) !== -1) {
        applyFilter(topic);
        return;
      }

      applyFilter('all');
      if (window.location.hash) {
        scrollToHashTarget(window.location.hash);
      }
    }

    applyHashFilter();
    window.addEventListener('hashchange', applyHashFilter);
    window.addEventListener('popstate', applyHashFilter);
  });
});
</script>
