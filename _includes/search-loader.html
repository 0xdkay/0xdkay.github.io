{% capture not_found %}
  <p class="mt-5">
    <span class="lang-en">{{ site.data.locales[include.lang].search.no_results }}</span>
    <span class="lang-ko" style="display:none;">검색 결과가 없습니다.</span>
  </p>
{% endcapture %}

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    let allEntries = [];

    if (!searchInput || !resultsContainer) {
      return;
    }

    const resultGroups = [
      { key: 'Topic', id: 'search-topics', title: 'Topics', singular: 'Topic', plural: 'Topics' },
      { key: 'Paper', id: 'search-publications', title: 'Publications', singular: 'Publication', plural: 'Publications' },
      { key: 'Talk', id: 'search-talks', title: 'Talks', singular: 'Talk', plural: 'Talks' },
      { key: 'Blog', id: 'search-blog', title: 'Blog', singular: 'Blog Post', plural: 'Blog Posts' }
    ];

    function normalizeLang(lang) {
      return lang && lang.indexOf('ko') === 0 ? 'ko' : 'en';
    }

    function currentLang() {
      try {
        return normalizeLang(localStorage.getItem('site-lang') || document.documentElement.getAttribute('data-lang') || document.documentElement.lang || 'en');
      } catch (e) {
        return normalizeLang(document.documentElement.getAttribute('data-lang') || document.documentElement.lang || 'en');
      }
    }

    function buildGroups(entries) {
      const groups = new Map();

      entries.forEach((entry) => {
        const key = entry.translation_key || entry.url;
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(entry);
      });

      return groups;
    }

    function preferredEntries(entries) {
      const lang = currentLang();
      const groups = buildGroups(entries);

      return Array.from(groups.values()).map((group) => {
        return group.find((entry) => normalizeLang(entry.lang) === lang) ||
          group.find((entry) => normalizeLang(entry.lang) === 'en') ||
          group[0];
      });
    }

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    function tokens(value) {
      return normalizeText(value).split(/[^a-z0-9]+/).filter(Boolean);
    }

    function queryTerms(query) {
      return normalizeText(query).split(/\s+/).filter(Boolean);
    }

    function fieldScore(value, query, exactTokenWeight, substringWeight) {
      const text = normalizeText(value);
      if (!text) {
        return 0;
      }

      const queryText = normalizeText(query);
      if (tokens(text).includes(queryText)) {
        return exactTokenWeight;
      }

      return text.includes(queryText) ? substringWeight : 0;
    }

    function categoryWeight(entry) {
      if (entry.categories === 'Paper') return 30;
      if (entry.categories === 'Talk') return 20;
      if (entry.categories === 'Topic') return 10;
      return 0;
    }

    function topicTitleBoost(entry, query) {
      if (entry.categories !== 'Topic') {
        return 0;
      }

      return fieldScore(entry.title, query, 100, 40);
    }

    function relevanceForTerm(entry, query) {
      return categoryWeight(entry) + topicTitleBoost(entry, query) + Math.max(
        fieldScore(entry.title, query, 600, 250),
        fieldScore(entry.tags, query, 500, 180),
        fieldScore(entry.categories, query, 420, 120),
        fieldScore(entry.keywords, query, 360, 140),
        fieldScore(entry.summary, query, 250, 80),
        fieldScore(entry.content, query, 120, 20)
      );
    }

    function relevance(entry, query) {
      const terms = queryTerms(query);
      const termScore = terms.reduce((sum, term) => sum + relevanceForTerm(entry, term), 0);
      return Math.max(relevanceForTerm(entry, query), termScore);
    }

    function searchableText(entry) {
      return normalizeText([
        entry.title,
        entry.categories,
        entry.tags,
        entry.keywords,
        entry.summary,
        entry.content
      ].join(' '));
    }

    function matches(entry, query) {
      const text = searchableText(entry);
      return queryTerms(query).every((term) => text.includes(term));
    }

    function entryTime(entry) {
      const parsed = Date.parse(entry.date || '1970-01-01');
      return Number.isNaN(parsed) ? 0 : parsed;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function countLabel(group, count) {
      return `${count} ${count === 1 ? group.singular : group.plural}`;
    }

    function renderStats(grouped) {
      const items = resultGroups.map((group) => {
        const count = grouped[group.key].length;
        const label = countLabel(group, count);

        if (count > 0) {
          return `<a href="#${group.id}">${escapeHtml(label)}</a>`;
        }

        return `<span>${escapeHtml(label)}</span>`;
      });

      return `<div class="search-stats">${items.join('')}</div>`;
    }

    function renderCard(entry) {
      return `
        <article class="search-card" data-category="${escapeHtml(entry.categories)}">
          <div class="search-card-meta">
            <span>${escapeHtml(entry.categories)}</span>
            <span>${escapeHtml(entry.tags)}</span>
          </div>
          <h2 class="search-card-title"><a href="${escapeHtml(entry.url)}">${escapeHtml(entry.title)}</a></h2>
          <p class="search-card-detail">${escapeHtml(entry.summary)}</p>
        </article>
      `;
    }

    function renderSection(group, entries) {
      if (entries.length === 0) {
        return '';
      }

      return `
        <section id="${group.id}" class="search-section">
          <div class="search-section-header">
            <h2>${escapeHtml(group.title)}</h2>
            <span>${escapeHtml(countLabel(group, entries.length))}</span>
          </div>
          <div class="search-card-list">
            ${entries.map(renderCard).join('')}
          </div>
        </section>
      `;
    }

    function renderResults() {
      const query = searchInput.value.trim();

      if (!query) {
        resultsContainer.innerHTML = '';
        return;
      }

      const matchesByScore = preferredEntries(allEntries)
        .filter((entry) => matches(entry, query))
        .map((entry) => ({ entry, score: relevance(entry, query) }))
        .sort((a, b) => {
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          return entryTime(b.entry) - entryTime(a.entry);
        });

      if (matchesByScore.length === 0) {
        resultsContainer.innerHTML = '{{ not_found | strip_newlines }}';
        return;
      }

      const grouped = resultGroups.reduce((acc, group) => {
        acc[group.key] = [];
        return acc;
      }, {});

      matchesByScore.forEach(({ entry }) => {
        if (grouped[entry.categories]) {
          grouped[entry.categories].push(entry);
        }
      });

      resultsContainer.innerHTML = [
        renderStats(grouped),
        ...resultGroups.map((group) => renderSection(group, grouped[group.key]))
      ].join('');
    }

    if (searchInput) {
      searchInput.addEventListener('input', renderResults);
    }

    document.addEventListener('site-lang-change', renderResults);

    fetch('{{ '/assets/js/data/search.json' | relative_url }}')
      .then((response) => response.json())
      .then((entries) => {
        allEntries = entries;
        renderResults();
      });
  });
</script>
