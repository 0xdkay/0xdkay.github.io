<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

{% capture result_elem %}
  <article class="{lang_class} search-card" data-category="{categories}">
    <div class="search-card-meta">
      <span>{categories}</span>
      <span>{tags}</span>
    </div>
    <h2 class="search-card-title"><a href="{url}">{title}</a></h2>
    <p class="search-card-detail">{summary}</p>
  </article>
{% endcapture %}

{% capture not_found %}
  <p class="mt-5">
    <span class="lang-en">{{ site.data.locales[include.lang].search.no_results }}</span>
    <span class="lang-ko" style="display:none;">검색 결과가 없습니다.</span>
  </p>
{% endcapture %}

<script>
  {% comment %} Note: dependent library will be loaded in `js-selector.html` {% endcomment %}
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    let allEntries = [];
    let searchController = null;

    function normalizeLang(lang) {
      return lang && lang.indexOf('ko') === 0 ? 'ko' : 'en';
    }

    function buildGroups(entries) {
      const groups = new Map();

      entries.forEach((entry) => {
        const key = entry.translation_key || entry.url;
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(entry);
      });

      return groups;
    }

    function langClass(entry, groups) {
      const group = groups.get(entry.translation_key || entry.url) || [];
      const hasEnglish = group.some((item) => normalizeLang(item.lang) === 'en');
      const hasKorean = group.some((item) => normalizeLang(item.lang) === 'ko');

      if (hasEnglish && hasKorean) {
        return normalizeLang(entry.lang) === 'ko' ? 'lang-ko-block' : 'lang-en-block';
      }

      return '';
    }

    function searchableEntries(entries) {
      const groups = buildGroups(entries);

      return entries.map((entry) => ({
        lang_class: langClass(entry, groups),
        title: entry.title,
        url: entry.url,
        categories: entry.categories,
        tags: entry.tags,
        keywords: entry.keywords,
        date: entry.date,
        summary: entry.summary,
        content: entry.content
      }));
    }

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    function tokens(value) {
      return normalizeText(value).split(/[^a-z0-9]+/).filter(Boolean);
    }

    function fieldScore(value, query, exactTokenWeight, substringWeight) {
      const text = normalizeText(value);
      if (!text) {
        return 0;
      }

      const queryText = normalizeText(query);
      if (tokens(text).includes(queryText)) {
        return exactTokenWeight;
      }

      return text.includes(queryText) ? substringWeight : 0;
    }

    function categoryWeight(entry) {
      if (entry.categories === 'Paper') return 30;
      if (entry.categories === 'Talk') return 20;
      if (entry.categories === 'Topic') return 10;
      return 0;
    }

    function topicTitleBoost(entry, query) {
      if (entry.categories !== 'Topic') {
        return 0;
      }

      return fieldScore(entry.title, query, 100, 40);
    }

    function relevance(entry, query) {
      return categoryWeight(entry) + topicTitleBoost(entry, query) + Math.max(
        fieldScore(entry.title, query, 600, 250),
        fieldScore(entry.tags, query, 500, 180),
        fieldScore(entry.categories, query, 420, 120),
        fieldScore(entry.keywords, query, 360, 140),
        fieldScore(entry.summary, query, 250, 80),
        fieldScore(entry.content, query, 120, 20)
      );
    }

    function initSearch() {
      if (allEntries.length === 0) {
        return;
      }

      searchController = SimpleJekyllSearch({
        searchInput: searchInput,
        resultsContainer: resultsContainer,
        json: searchableEntries(allEntries),
        limit: 100,
        sortMiddleware: function(a, b) {
          const query = searchInput.value || '';
          const scoreDiff = relevance(b, query) - relevance(a, query);
          if (scoreDiff !== 0) {
            return scoreDiff;
          }

          return Date.parse(b.date || '1970-01-01') - Date.parse(a.date || '1970-01-01');
        },
        searchResultTemplate: '{{ result_elem | strip_newlines }}',
        noResultsText: '{{ not_found }}'
      });

      if (searchInput.value) {
        searchController.search(searchInput.value);
      }
    }

    fetch('{{ '/assets/js/data/search.json' | relative_url }}')
      .then((response) => response.json())
      .then((entries) => {
        allEntries = entries;
        initSearch();
      });

  });
</script>
