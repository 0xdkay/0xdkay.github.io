bio: "I work on AI-powered security automation at Microsoft, focusing on vulnerability discovery, exploit generation, and scalable defenses."

intro:
  - "I work on <strong>AI-powered security automation</strong> at Microsoft, focusing on vulnerability discovery, exploit generation, and scalable defenses. My work brings together LLM agents, program analysis, fuzzing, red teaming, and real-world systems security."
  - "I care about turning deep technical research into <strong>reliable systems</strong> that teams can build, operate, and improve together. That perspective is grounded in a broader white-hat security background spanning mobile and cellular networks, IoT firmware, embedded systems, drones, sensors, and cyber-physical systems."

highlights:
  - "DARPA AIxCC 1st Place Winner (Team Atlanta)"
  - "5x DEF CON CTF Finalist with multiple CTF awards"
  - "Publications in USENIX Security, CCS, NDSS, TSE, and TMC, with 1,400+ citations"

